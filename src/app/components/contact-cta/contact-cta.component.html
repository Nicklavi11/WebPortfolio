<section class="contact-cta reveal">
  <div>
    <h2>Interested?</h2>
    <p>Drop your email and I’ll make it easy to start a conversation.</p>
  </div>

  <form (submit)="goToContact($event)" class="email-capture" aria-label="Start a contact message">
    <label for="ctaEmail">Your email</label>
    <div>
      <input
        id="ctaEmail"
        type="email"
        name="email"
        placeholder="recruiter@company.com"
        [value]="email()"
        (input)="updateEmail($any($event.target).value)"
      />
      <button class="btn primary" type="submit">Contact</button>
    </div>
  </form>
</section>
