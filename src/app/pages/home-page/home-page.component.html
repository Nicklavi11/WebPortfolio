<div id="top" class="site-shell home-shell">
  <app-intro-panel [sections]="navSections" [socialLinks]="socialLinks" />

  <main class="scroll-column" id="main">
    <section id="experience" class="page-section">
      <h2 class="subtle-section-title reveal">Experience</h2>

      <div class="timeline-list">
        @for (experience of experienceItems; track experience.role) {
          <app-experience-card [experience]="experience" />
        }
      </div>

      <a id="resume" class="resume-link reveal" href="assets/docs/Nicholas_Laviano_Resume.pdf" target="_blank" rel="noreferrer">
        View full resume
        <span aria-hidden="true">-&gt;</span>
      </a>
    </section>

    <section id="projects" class="page-section">
      <h2 class="subtle-section-title reveal">Featured projects</h2>

      <div class="project-stack">
        @for (project of featuredProjects; track project.slug) {
          <app-project-card [project]="project" />
        }
      </div>

      <a class="archive-link reveal" routerLink="/projects">
        View full project archive
        <span aria-hidden="true">-&gt;</span>
      </a>
    </section>

    <section id="contact">
      <app-contact-cta />
    </section>

    <app-site-footer />
  </main>
</div>
